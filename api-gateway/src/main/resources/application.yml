server:
  port: 8084

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: patient-service
          uri: http://patient-service:8080
          predicates:
            - Path=/api/patients/**, /api/auth/**
          filters:
            - AuthenticationFilter

        - id: doctor-service
          uri: http://doctor-service:8081
          predicates:
            - Path=/api/doctors/**
          filters:
            - AuthenticationFilter

        - id: appointment-service
          uri: http://appointment-service:8082
          predicates:
            - Path=/api/appointments/**
          filters:
            - AuthenticationFilter

        - id: telemedicine-service
          uri: http://telemedicine-service:8085
          predicates:
            - Path=/api/sessions,/api/sessions/**
          filters:
            - AuthenticationFilter

        - id: payment-service
          uri: http://payment-service:8086
          predicates:
            - Path=/api/payments/**
          filters:
            - AuthenticationFilter

        - id: symptom-checker-service
          uri: http://symptom-checker-service:8087
          predicates:
            - Path=/api/symptoms/**
          filters:
            - AuthenticationFilter

        - id: admin-service
          uri: http://admin-service:8088
          predicates:
            - Path=/api/admin/**
          filters:
            - AuthenticationFilter

management:
  endpoints:
    web:
      exposure:
        include: gateway
  endpoint:
    gateway:
      enabled: true

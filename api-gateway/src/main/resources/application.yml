server:
  port: 8084

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: patient-service
          uri: http://localhost:8080
          predicates:
            - Path=/api/patients/**
          filters:
            - AuthenticationFilter

        - id: doctor-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/doctors/**
          filters:
            - AuthenticationFilter

        - id: appointment-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/appointments/**
          filters:
            - AuthenticationFilter

        - id: telemedicine-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/telemedicine/**
          filters:
            - AuthenticationFilter

        - id: payment-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/payments/**
          filters:
            - AuthenticationFilter

        - id: symptom-checker-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/symptoms/**
          filters:
            - AuthenticationFilter

        - id: admin-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/admin/**
          filters:
            - AuthenticationFilter

management:
  endpoints:
    web:
      exposure:
        include: gateway
  endpoint:
    gateway:
      enabled: true

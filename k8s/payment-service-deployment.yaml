apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
      - name: payment-service
        image: healthcare-platform-payment-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8086

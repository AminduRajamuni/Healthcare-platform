server:
  port: 8086

spring:
  application:
    name: payment-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  datasource:
    url: jdbc:mysql://localhost:3306/payment_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: pass123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

payhere:
  # Merchant ID is account-level and must come from environment for your own sandbox/live account.
  merchant-id: ${PAYHERE_MERCHANT_ID:1235071}
  # Merchant Secret is domain/app-specific. Use the secret generated for the exact integrating domain/app.
  merchant-secret: ${PAYHERE_MERCHANT_SECRET:MTcwNzU3MTk0MTM3NzkwNzczMTgzMzU3ODc3NTEyMjA0NTA0Mzk=}
  checkout-url: ${PAYHERE_CHECKOUT_URL:https://sandbox.payhere.lk/pay/checkout}
  # Keep all callback URLs on one public host in sandbox (for example your current ngrok URL).
  public-base-url: ${PAYHERE_PUBLIC_BASE_URL:https://climate-monthly-ipod.ngrok-free.dev}
  return-url: ${payhere.public-base-url}/api/payments/payhere/return
  cancel-url: ${payhere.public-base-url}/api/payments/payhere/cancel
  notify-url: ${payhere.public-base-url}/api/payments/payhere/notify
  sandbox: ${PAYHERE_SANDBOX:true}

services:
  appointment:
    base-url: ${APPOINTMENT_SERVICE_BASE_URL:http://localhost:8082}

events:
  payment:
    topic: ${PAYMENT_EVENTS_TOPIC:payment.events}
